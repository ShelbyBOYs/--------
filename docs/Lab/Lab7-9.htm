<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Clicker Game</title>
</head>
<body>

    <h1>Clicker Game</h1>

    <h2>Кредити: <span id="credits">0</span></h2>
    <h3>Duiktcoins: <span id="duiktcoins">0</span></h3>

    <button id="clickBtn">Клік +1</button>

    <h2>Апгрейди</h2>
    <button id="upgradeClick">Покращити клік</button>
    <button id="autoClicker">Автоклікер</button>
    <button id="passiveIncome">Пасивний дохід</button>
    <button id="comboUpgrade">Combo upgrade</button>
    <button id="bonusUpgrade">Bonus upgrade</button>

    <h2>Бонуси</h2>
    <button id="caseBtn">Відкрити кейс</button>
    <button id="wheelBtn">Колесо фортуни</button>

    <h2>Антибонуси</h2>
    <button id="virusBtn">Вірус</button>
    <p id="effectText">Ефектів немає</p>

    <h2>Престиж</h2>
    <button id="prestigeBtn">Скинути прогрес</button>

    <h2>Скіни</h2>
    <button id="skinDefault">Звичайний скін</button>
    <button id="skinDark">Темний скін</button>

    <script src="Lab7-9.js"></script>
</body>
</html>
