<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конструктор резюме</title>
</head>
<body>
  <h1>Конструктор резюме</h1>

  <div>
    <label>Ім'я:</label>
    <input type="text" id="name">
  </div>

  <div>
    <label>Email:</label>
    <input type="text" id="email">
  </div>

  <div>
    <label>Телефон:</label>
    <input type="text" id="phone">
  </div>

  <div>
    <label>Освіта:</label>
    <input type="text" id="education">
  </div>

  <div>
    <label>Досвід роботи:</label>
    <input type="text" id="experience">
  </div>

  <div>
    <label>Навички:</label>
    <input type="text" id="skills" placeholder="HTML, CSS, JS">
  </div>

  <br>
  <button id="createBtn">Створити резюме</button>

  <h2>Готове резюме</h2>
  <div id="resumeOutput"></div>

  <script src="Lab1-3.js" defer></script>
</body>
</html>
